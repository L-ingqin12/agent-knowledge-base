# Resource-Class Pattern Configuration
# Format: <class>:<regex>
# First match wins. Lines starting with # are comments.
# Used by: agent-gate.sh detect <command>

# CPU-heavy: compilation, package installation, build tools
cpu:(npm|yarn|pnpm) (install|build|rebuild|add|update)
cpu: pip(3)? install
cpu: cmake\b
cpu: make\b
cpu: (gcc|g\+\+|clang)\b
cpu: npx (tsc|build|webpack|vite build)
cpu: cargo (build|install)
cpu: go (build|install)

# IO-heavy: recursive filesystem scans, large file operations
io: grep\s+-r\s+/
io: find\s+/
io: rsync
io: dd\b
io: tar\s+-[cx]

# Network-heavy: large downloads, git clones
net: curl\s+.*-[oO]\s
net: wget\b
net: git\s+(clone|pull)
net: pip3? download

# Memory-heavy: ML training, video processing, image batch
mem: python3? .*(train|model|fine-?tun)
mem: ffmpeg\b
mem: convert\b.*-resize
mem: node .*(webpack|vite).*build
